<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Design</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>✨ Random Design</h1>
                <p>A modern, interactive showcase</p>
            </div>
            <div class="card-content">
                <div class="grid">
                    <div class="item">
                        <div class="item-icon">🚀</div>
                        <h3>Launch</h3>
                        <p>Get started fast</p>
                    </div>
                    <div class="item">
                        <div class="item-icon">💎</div>
                        <h3>Premium</h3>
                        <p>Best quality</p>
                    </div>
                    <div class="item">
                        <div class="item-icon">⚡</div>
                        <h3>Fast</h3>
                        <p>Lightning quick</p>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn-primary">Get Started</button>
                    <button class="btn-secondary">Learn More</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
